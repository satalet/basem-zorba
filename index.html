<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Basim - Special Ops</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Courier New', monospace; }
        canvas { border: 3px solid #0ff; box-shadow: 0 0 25px #0ff; border-radius: 10px; cursor: crosshair; }
        #ui { position: absolute; top: 20px; text-align: center; width: 100%; pointer-events: none; }
        .stat { font-size: 22px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat">Commander Basim Strike Count: <span id="score">0</span></div>
    </div>
    <canvas id="gameCanvas" width="450" height="650"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // --- محرك الأصوات البرمجي ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        let score = 0;
        let player = { x: 200, y: 580, width: 40, height: 40 };
        let bullets = [];
        let enemies = [];
        let keys = {};

        function spawnEnemy() {
            enemies.push({ x: Math.random() * (canvas.width - 30), y: -30, size: 25, speed: 2 + Math.random() * 3 });
        }
        setInterval(spawnEnemy, 900);

        window.addEventListener("keydown", (e) => {
            keys[e.code] = true;
            if(e.code === "Space") {
                bullets.push({ x: player.x + 15, y: player.y, w: 10, h: 20 });
                playSound(440, 'sawtooth', 0.1); // صوت إطلاق النار
            }
        });
        window.addEventListener("keyup", (e) => keys[e.code] = false);

        function update() {
            if (keys["ArrowLeft"] && player.x > 0) player.x -= 7;
            if (keys["ArrowRight"] && player.x < canvas.width - player.width) player.x += 7;

            bullets.forEach((b, i) => {
                b.y -= 10;
                if(b.y < 0) bullets.splice(i, 1);
            });

            enemies.forEach((e, i) => {
                e.y += e.speed;
                bullets.forEach((b, j) => {
                    if(b.x < e.x + e.size && b.x + b.w > e.x && b.y < e.y + e.size && b.y + b.h > e.y) {
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        score++;
                        scoreElement.innerText = score;
                        playSound(150, 'square', 0.2); // صوت الانفجار
                    }
                });
            });
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Watermark
            ctx.fillStyle = "#111";
            ctx.font = "bold 40px Arial";
            ctx.textAlign = "center";
            ctx.fillText("THE HERO BASIM", canvas.width/2, canvas.height/2);

            // Player (Spaceship)
            ctx.fillStyle = "#0ff";
            ctx.beginPath();
            ctx.moveTo(player.x + 20, player.y);
            ctx.lineTo(player.x + 40, player.y + 40);
            ctx.lineTo(player.x, player.y + 40);
            ctx.fill();

            // Bullets
            ctx.fillStyle = "yellow";
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Enemies
            ctx.fillStyle = "#f00";
            enemies.forEach(e => {
                ctx.beginPath();
                ctx.arc(e.x + e.size/2, e.y + e.size/2, e.size/2, 0, Math.PI*2);
                ctx.fill();
            });
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
